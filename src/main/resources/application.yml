server:
    port: ${PORT:8762}

eureka:
    instance:
        preferIpAddress: true
        hostname: ${HOSTNAME:localhost}

    client:
        registerWithEureka: true
        fetchRegistry: true
        serviceUrl:
            defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

spring:
    application:
        name: gateway
    cloud:
        gateway:
            server:
                webflux:
                    discovery:
                        locator:
                            enabled: true
                            lower-case-service-id: true
                    default-filters:
                        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
                    globalcors:
                        cors-configurations:
                            '[/**]': ## For all routes
                                allowedOrigins: ${ALLOWED_ORIGINS:*} # With '*' we allow all origins. We can restrict by indicating domains or ip + port, e.g. http://localhost:3000 (where our front is, or a Vercel domain)
                                allowedHeaders: "*" ## All headers allowed
                                allowedMethods:
                                    - GET
                                    - POST
                                    - PUT
                                    - DELETE
                                    - PATCH

management:
    endpoint:
        gateway:
            access: ${ROUTE_TABLES_ENABLED:read_only}
    endpoints:
        web:
            exposure:
                include:
                    - '*'